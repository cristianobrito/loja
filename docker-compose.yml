version: "3.9"

services:
  php:
    build:
      context: ./images/php
    container_name: ct_php
    volumes:
      - ./volume_app:/var/www/html
    networks:
      - app_net

  nginx:
    image: nginx:latest
    container_name: ct_nginx
    ports:
      - "8080:80"
    volumes:
      - ./images/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./volume_app:/var/www/html
    depends_on:
      - php
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
